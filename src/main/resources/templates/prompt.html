<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChemTos</title>
  <meta name="description" content="ChemTos">
  <meta name="keywords" content="ChemTos">
  <meta name="author" content="ChemTos">
  <meta property="og:locale" content="ko_KR" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="ChemTos" />
  <meta property="og:description" content="ChemTos" />
  <meta property="og:site_name" content="ChemTos" />
  <link rel="stylesheet" href="../static/css/common.css">


  <script src="../static/js/scripts.js"></script>
</head>

<body>
  <div class="app">
    <!-- PC 사이드바 -->
    <aside class="app-sidebar">
      <a href="index" class="sidebar-logo">ChemTos</a>
      <a href="prompt" class="sidebar-icon" data-tooltip="Prompt">
        <img src="../static/images/icon/ico-section.svg" />
      </a>
      <button type="button" class="sidebar-icon js-helpdesk-trigger" data-tooltip="Help Desk">
        <img src="../static/images/icon/ico-helpdesk.svg" />
      </button>
      <a href="quickActions.html" class="sidebar-icon" data-tooltip="Quick Actions">
        <img src="../static/images/icon/ico-faq.svg" />
      </a>
      <div class="user">
        <button type="button" class="sidebar-icon user-toggle" aria-haspopup="true" aria-expanded="false">
          <img src="../static/images/icon/ico-user.svg" alt="사용자 메뉴" />
        </button>
      </div>
      <div id="sidebar-tooltip" class="tooltip-box"></div>

      <div id="user-menu" class="user-menu">
        <button type="button" class="user-menu-item">설정</button>
        <button type="button" class="user-menu-item">로그아웃</button>
      </div>
    </aside>

    <!-- Help Desk 사이드 패널 -->
    <aside id="helpdesk-panel" class="helpdesk-panel">
      <div class="panel-header">
        <h2>Help Desk</h2>
        <button id="panel-close" class="close-btn">←</button>
      </div>
      <div class="faq-section">
        <div class="section-title"><img src="../static/images/icon/ico-Inventory.svg">Inventory 질문 길잡이</div>
        <div class="faq-select">
          <select id="select-item" class="faq-selectbox">
            <option value="">품목구분 선택하세요</option>
            <option value="화학물질">화학물질</option>
            <option value="원료">원료</option>
            <option value="부자재">부자재</option>
          </select>
        </div>
        <div class="faq-select">
          <select id="select-material" class="faq-selectbox">
            <option value="">자재 선택하세요</option>
            <option value="용제">용제</option>
            <option value="촉매">촉매</option>
            <option value="첨가제">첨가제</option>
          </select>
        </div>
        <div class="faq-select">
          <select id="select-vendor" class="faq-selectbox">
            <option value="">벤더명 선택하세요</option>
            <option value="LG화학">LG화학</option>
            <option value="롯데정밀화학">롯데정밀화학</option>
            <option value="한화솔루션">한화솔루션</option>
          </select>
        </div>
      </div>

      <div class="faq-section">
        <div class="section-title"><img src="../static/images/icon/ico-MSDS.svg">MSDS 질문 길잡이</div>
        <div class="faq-select">
          <select id="select-item" class="faq-selectbox">
            <option value="">제품명을 선택하세요</option>
            <option value="화학물질">화학물질</option>
            <option value="원료">원료</option>
            <option value="부자재">부자재</option>
          </select>
        </div>
        <div class="faq-select">
          <select id="select-item" class="faq-selectbox">
            <option value="">자재를 선택하세요</option>
            <option value="화학물질">화학물질</option>
            <option value="원료">원료</option>
            <option value="부자재">부자재</option>
          </select>
        </div>
        <div class="faq-select">
          <select id="select-item" class="faq-selectbox">
            <option value="">벤더명을 선택하세요</option>
            <option value="화학물질">화학물질</option>
            <option value="원료">원료</option>
            <option value="부자재">부자재</option>
          </select>
        </div>
      </div>
    </aside>

    <!-- 메인 -->
    <main class="prompt-main">
      <div class="app-main-inner">
        <!-- 모바일 헤더 -->
        <div class="app-header-mobile">
          <button class="app-header-mobile-menu" type="button"></button>
          <a href="index.html" class="app-header-mobile-logo">
            <div class="sidebar-logo">ChemTos</div>
          </a>
        </div>
        <!-- 모바일 전체 메뉴 -->
        <div id="mobile-menu" class="mobile-menu">
          <div class="mobile-menu-inner">
            <button class="mobile-menu-close" type="button">×</button>
            <a href="prompt.html" class="mobile-menu-item">Prompt</a>
            <a href="#" class="mobile-menu-item js-helpdesk-trigger" data-tooltip="Help Desk">Help Desk</a>
            <a href="quickActions.html" class="mobile-menu-item">Quick Actions</a>
            <div class="mobile-divider"></div>
            <a href="#" class="mobile-menu-item">설정</a>
            <a href="#" class="mobile-menu-item">로그아웃</a>
          </div>
        </div>
        <!-- 질문과 답-->
        <section class="chat-wrap">
          <!-- 내 메시지 -->
          <div class="chat-row me">
            <div class="chat-bubble">
              CAS NO 50-00-0의 인벤토리에 등록되어 있어?
            </div>
          </div>
          <!-- GPT 메시지 -->
          <div class="chat-row bot">
            <div class="chat-logo-wrap">
              <div class="chat-logo"></div>
              <div class="chat-logo-ring"></div>
            </div>
            <div class="answer-flex">
              <div class="chat-bubble answer is-loading">
                <p class="loading-text">화학물질 데이터를 분석하고 있어요...</p>
                <div class="loading-dots">
                  <span></span><span></span><span></span>
                </div>
              </div>
            </div>
          </div>

        </section>

        <!-- Prompt -->
        <div class="prompt-box-type">
          <textarea class="prompt-textarea-type" placeholder="궁금한 내용을 질문해보세요."></textarea>
          <div class="btn-area">
            <input type="file" id="fileUpload" class="hidden-file" />
            <button class="btn-add" type="button" id="btnAdd" data-tooltip="파일 첨부">추가</button>
            <button class="btn-send" type="button" data-tooltip="메시지 전송"></button>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>

</html>
